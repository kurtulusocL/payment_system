services:

  paymentsystem.api:
    container_name: paymentsystem_api
    build:
      context: .
      dockerfile: PaymentSystem.Api/Dockerfile
    ports:
      - "5000:8080"
      - "5001:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ConnectionStrings__DefaultConnection=Server=paymentsystem_sqlserver_local,1433;Database=PaymentSystem;User Id=sa;Password=PaymentSystem_Local123!;TrustServerCertificate=True;MultipleActiveResultSets=true;
      - ConnectionStrings__AzureConnection=Server=paymentsystem_sqlserver_azure,1433;Database=PaymentSystemAzure_Simule;User Id=sa;Password=PaymentSystem_Azure123!;TrustServerCertificate=True;MultipleActiveResultSets=true;
      - ConnectionStrings__Redis=paymentsystem_redis:6379
      - ConnectionStrings__RabbitMQ=amqp://guest:guest@paymentsystem_rabbitmq:5672/
      - JwtSettings__Secret=yours
      - JwtSettings__Issuer=PaymentSystem
      - JwtSettings__Audience=PaymentSystemClient
      - JwtSettings__ExpiryMinutes=60
    depends_on:
      - sqlserver-local
      - sqlserver-azure
      - redis
      - rabbitmq
    networks:
      - paymentsystem_network

  paymentsystem.webui:
    container_name: paymentsystem_webui
    build:
      context: .
      dockerfile: PaymentSystem.WebUI/Dockerfile
    ports:
      - "5002:8080"
      - "5003:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=8080
      - ASPNETCORE_HTTPS_PORTS=8081
      - ApiSettings__BaseUrl=http://paymentsystem.api:8080
      - ApiSettings__HttpUrl=http://paymentsystem.api:8080
    depends_on:
      - paymentsystem.api
    networks:
      - paymentsystem_network

  sqlserver-local:
    container_name: paymentsystem_sqlserver_local
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=PaymentSystem_Local123!
      - MSSQL_PID=Developer
    volumes:
      - sqlserver_local_data:/var/opt/mssql
    networks:
      - paymentsystem_network

  sqlserver-azure:
    container_name: paymentsystem_sqlserver_azure
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1434:1433"
    environment:
      - ACCEPT_EULA=Y
      - SA_PASSWORD=PaymentSystem_Azure123!
      - MSSQL_PID=Developer
    volumes:
      - sqlserver_azure_data:/var/opt/mssql
    networks:
      - paymentsystem_network

  redis:
    container_name: paymentsystem_redis
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - paymentsystem_network

  rabbitmq:
    container_name: paymentsystem_rabbitmq
    image: rabbitmq:3.13-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - paymentsystem_network

volumes:
  sqlserver_local_data:
  sqlserver_azure_data:
  redis_data:
  rabbitmq_data:

networks:
  paymentsystem_network:
    driver: bridge